name: SonarCloud Scan

on:
  push:
    branches:
      - main
      - sonarcloud-integration
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=./ --cov-report=xml

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: .
          args: "-Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} -Dsonar.sources=. -Dsonar.python.coverage.reportPaths=coverage.xml -Dsonar.tests=tests -Dsonar.test.inclusions=tests/**/*.py -Dsonar.sourceEncoding=UTF-8 -Dsonar.exclusions=.github/**,tests/** -Dsonar.login=${{ secrets.SONAR_TOKEN }}"
